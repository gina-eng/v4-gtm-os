<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>V4 — [TITULO_DA_TELA]</title>

  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <!-- Inter font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- V4 Design Tokens -->
  <style>
    :root {
      --background: 0 0% 99%;
      --foreground: 0 0% 9%;
      --card: 0 0% 100%;
      --card-foreground: 0 0% 9%;
      --popover: 0 0% 100%;
      --popover-foreground: 0 0% 9%;
      --primary: 0 0% 9%;
      --primary-foreground: 0 0% 99%;
      --secondary: 0 0% 96%;
      --secondary-foreground: 0 0% 9%;
      --muted: 0 0% 96%;
      --muted-foreground: 0 0% 45%;
      --accent: 355 59% 26%;
      --accent-foreground: 0 0% 100%;
      --destructive: 0 72% 51%;
      --destructive-foreground: 0 0% 100%;
      --border: 0 0% 90%;
      --input: 0 0% 90%;
      --ring: 0 0% 9%;
      --radius: 0.25rem;
      --sidebar-background: 0 0% 98%;
      --sidebar-foreground: 0 0% 9%;
      --sidebar-primary: 0 0% 9%;
      --sidebar-primary-foreground: 0 0% 98%;
      --sidebar-accent: 0 0% 94%;
      --sidebar-accent-foreground: 0 0% 9%;
      --sidebar-border: 0 0% 90%;
      --sidebar-ring: 0 0% 9%;
      --success: 142 71% 25%;
      --success-foreground: 0 0% 100%;
      --warning: 38 92% 50%;
      --warning-foreground: 0 0% 10%;
      --table-header: 0 43% 35%;
      --table-header-foreground: 0 0% 100%;
    }
    .dark {
      --background: 0 0% 4%;
      --foreground: 0 0% 93%;
      --card: 0 0% 6%;
      --card-foreground: 0 0% 93%;
      --popover: 0 0% 6%;
      --popover-foreground: 0 0% 93%;
      --primary: 0 0% 93%;
      --primary-foreground: 0 0% 4%;
      --secondary: 0 0% 12%;
      --secondary-foreground: 0 0% 93%;
      --muted: 0 0% 12%;
      --muted-foreground: 0 0% 60%;
      --accent: 355 40% 40%;
      --accent-foreground: 0 0% 100%;
      --destructive: 0 62% 30%;
      --destructive-foreground: 0 0% 93%;
      --border: 0 0% 15%;
      --input: 0 0% 15%;
      --ring: 0 0% 93%;
      --sidebar-background: 0 0% 4%;
      --sidebar-foreground: 0 0% 93%;
      --sidebar-primary: 0 0% 93%;
      --sidebar-primary-foreground: 0 0% 4%;
      --sidebar-accent: 0 0% 10%;
      --sidebar-accent-foreground: 0 0% 93%;
      --sidebar-border: 0 0% 15%;
      --sidebar-ring: 0 0% 93%;
    }

    body {
      background-color: hsl(var(--background));
      color: hsl(var(--foreground));
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .tabular-nums { font-variant-numeric: tabular-nums; }
  </style>

  <!-- Tailwind config com tokens V4 -->
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            border: 'hsl(var(--border))',
            input: 'hsl(var(--input))',
            ring: 'hsl(var(--ring))',
            background: 'hsl(var(--background))',
            foreground: 'hsl(var(--foreground))',
            primary: { DEFAULT: 'hsl(var(--primary))', foreground: 'hsl(var(--primary-foreground))' },
            secondary: { DEFAULT: 'hsl(var(--secondary))', foreground: 'hsl(var(--secondary-foreground))' },
            destructive: { DEFAULT: 'hsl(var(--destructive))', foreground: 'hsl(var(--destructive-foreground))' },
            muted: { DEFAULT: 'hsl(var(--muted))', foreground: 'hsl(var(--muted-foreground))' },
            accent: { DEFAULT: 'hsl(var(--accent))', foreground: 'hsl(var(--accent-foreground))' },
            popover: { DEFAULT: 'hsl(var(--popover))', foreground: 'hsl(var(--popover-foreground))' },
            card: { DEFAULT: 'hsl(var(--card))', foreground: 'hsl(var(--card-foreground))' },
            success: { DEFAULT: 'hsl(var(--success))', foreground: 'hsl(var(--success-foreground))' },
            warning: { DEFAULT: 'hsl(var(--warning))', foreground: 'hsl(var(--warning-foreground))' },
            sidebar: {
              DEFAULT: 'hsl(var(--sidebar-background))',
              foreground: 'hsl(var(--sidebar-foreground))',
              accent: 'hsl(var(--sidebar-accent))',
              'accent-foreground': 'hsl(var(--sidebar-accent-foreground))',
              border: 'hsl(var(--sidebar-border))',
            },
            'table-header': { DEFAULT: 'hsl(var(--table-header))', foreground: 'hsl(var(--table-header-foreground))' },
          },
          borderRadius: {
            lg: 'var(--radius)',
            md: 'calc(var(--radius) - 2px)',
            sm: 'calc(var(--radius) - 4px)',
          },
          fontFamily: {
            sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'sans-serif'],
          },
        },
      },
    };
  </script>
</head>

<body>
  <div class="flex h-screen w-full overflow-hidden">

    <!-- ====================  SIDEBAR  ==================== -->
    <aside class="w-64 shrink-0 bg-sidebar border-r border-sidebar-border flex flex-col">
      <!-- Logo header -->
      <div class="px-4 py-3 flex items-center gap-2 border-b border-sidebar-border">
        <!-- Logo V4 oficial — fonte canônica em design-system/assets/v4-logo.svg -->
        <svg viewBox="0 0 71 71" class="h-6 w-6" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="V4 Company" role="img">

          <path d="M48.8722 39.7982C43.1413 39.7982 37.4104 39.7982 31.6794 39.7982C31.8386 39.3206 48.0763 23.0829 49.0314 22.6053C48.8722 28.3363 48.8722 34.0672 48.8722 39.7982Z" fill="#E50914"/>
        </svg>
        <span class="text-sm font-semibold text-sidebar-foreground">V4 Company</span>
      </div>

      <!-- Nav -->
      <nav class="flex-1 overflow-auto p-2">
        <div class="text-[10px] uppercase tracking-wider text-muted-foreground font-medium px-2 py-2">Navegação</div>
        <ul class="flex flex-col gap-1 text-sm">
          <!-- Item ativo -->
          <li>
            <a href="#" class="flex items-center gap-2 rounded-md p-2 h-8 bg-sidebar-accent font-medium text-sidebar-accent-foreground hover:bg-sidebar-accent">
              <i data-lucide="layout-dashboard" class="h-4 w-4"></i>
              <span>Item ativo</span>
            </a>
          </li>
          <!-- Item normal -->
          <li>
            <a href="#" class="flex items-center gap-2 rounded-md p-2 h-8 text-sidebar-foreground hover:bg-sidebar-accent">
              <i data-lucide="target" class="h-4 w-4"></i>
              <span>Item normal</span>
            </a>
          </li>
          <!-- Item desabilitado ("breve") -->
          <li>
            <button class="flex items-center gap-2 rounded-md p-2 h-8 w-full text-left text-sidebar-foreground opacity-35 cursor-not-allowed">
              <i data-lucide="flag-triangle-right" class="h-4 w-4"></i>
              <span class="flex-1">Em breve</span>
              <span class="text-[8px] uppercase tracking-widest text-muted-foreground/60 font-semibold">breve</span>
            </button>
          </li>
        </ul>
      </nav>
    </aside>

    <!-- ====================  MAIN  ==================== -->
    <div class="flex-1 flex flex-col min-w-0 overflow-hidden">

      <!-- Header superior -->
      <header class="h-12 flex items-center justify-between border-b border-border bg-card px-4 shrink-0">
        <button class="inline-flex items-center justify-center h-7 w-7 rounded hover:bg-muted text-foreground">
          <i data-lucide="panel-left" class="h-4 w-4"></i>
        </button>
        <div class="flex items-center gap-3">
          <span class="text-xs text-muted-foreground font-mono">Dados atualizados em: 18/05/2026</span>
          <button class="inline-flex items-center justify-center h-9 w-9 rounded hover:bg-muted" title="Sair">
            <i data-lucide="log-out" class="h-4 w-4" style="color: hsl(0, 84%, 41%);"></i>
          </button>
        </div>
      </header>

      <!-- Conteúdo -->
      <main class="flex-1 min-h-0 overflow-auto p-5">

        <!-- Título + ações -->
        <div class="flex items-center justify-between mb-4 gap-4">
          <div class="flex items-center gap-2">
            <h1 class="text-xl font-semibold text-foreground">[TITULO_DA_TELA]</h1>
            <button class="h-5 w-5 inline-flex items-center justify-center rounded text-muted-foreground hover:text-foreground">
              <i data-lucide="info" class="h-4 w-4"></i>
            </button>
          </div>
          <div class="flex items-center gap-2">
            <!-- Ações aqui -->
          </div>
        </div>

        <!-- ====================  CONTEUDO PRINCIPAL  ==================== -->
        <!-- COMECE A EDITAR AQUI -->

        <div class="bg-card border border-border rounded p-4">
          <p class="text-sm text-muted-foreground">Substitua este bloco pelo conteúdo da tela.</p>
        </div>

      </main>
    </div>
  </div>

  <script>
    // Inicializa ícones lucide
    lucide.createIcons();
  </script>
</body>
</html>
